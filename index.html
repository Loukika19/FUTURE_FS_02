<!DOCTYPE html>
<html>
<head>
    <title>Mini CRM</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        table, th, td{
            border:1px solid black;
        }

        th, td{
            padding:10px;
            text-align:center;
        }
    </style>
</head>

<body>

<h1>Client Lead Management System</h1>

<div class="container">

    <input type="text" id="name" placeholder="Enter Client Name">

    <input type="email" id="email" placeholder="Enter Email">

    <input type="text" id="source" placeholder="Lead Source">

    <select id="status">
        <option>New</option>
        <option>Contacted</option>
        <option>Converted</option>
    </select>

    <button onclick="addLead()">Add Lead</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Source</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="leadTable">
        </tbody>
    </table>

</div>

<script>

function addLead(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let source = document.getElementById("source").value;
    let status = document.getElementById("status").value;

    let table = document.getElementById("leadTable");

    let row = table.insertRow();

    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = email;
    row.insertCell(2).innerHTML = source;
    row.insertCell(3).innerHTML = status;

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("source").value = "";
}

</script>

</body>
</html>
